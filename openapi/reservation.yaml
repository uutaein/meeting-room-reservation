openapi: 3.1.0

info:
  title: Meeting Room Reservation API
  version: 0.1.0
  description: 17층 회의실 예약 관리 시스템 API 명세
  contact:
    name: utaein
    email: uutaein@gmail.com

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Reservation
    description: 회의실 예약 API

paths:
  /reservations:
    post:
      tags:
        - Reservation
      summary: 회의실 예약 생성
      description: |
        유효한 예약 정보로 회의실 예약을 생성한다.

        비즈니스 규칙:
        - 예약 가능 시간은 08:00부터 20:00까지다.
        - 예약은 30분 단위로만 가능하다.
        - 1회 예약은 최대 2시간까지 가능하다.
        - 회의실 1의 정원은 6명이다.
        - 회의실 2의 정원은 12명이다.
        - 같은 회의실의 기존 ACTIVE 예약과 시간이 겹치면 생성할 수 없다.
      operationId: createReservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
            examples:
              validRoom1Reservation:
                summary: 회의실 1 정상 예약
                value:
                  roomId: ROOM_1
                  reservationDate: '2026-06-10'
                  startTime: '09:00'
                  endTime: '10:00'
                  ownerName: 김철수
                  attendees: 4
                  purpose: 주간회의
      responses:
        '201':
          description: 예약 생성 성공
          headers:
            Location:
              description: 생성된 예약 리소스 경로
              schema:
                type: string
                example: /reservations/1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '400':
          description: 입력값 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              examples:
                requiredField:
                  summary: 필수값 누락
                  value:
                    code: ERR_REQUIRED_FIELD
                    message: 필수 입력값이 누락되었습니다.
                invalidTimeUnit:
                  summary: 30분 단위 위반
                  value:
                    code: ERR_TIME_UNIT
                    message: 예약 시간은 30분 단위여야 합니다.
                durationMax:
                  summary: 최대 예약 시간 초과
                  value:
                    code: ERR_DURATION_MAX
                    message: 1회 예약은 최대 2시간까지 가능합니다.
                capacityExceeded:
                  summary: 회의실 정원 초과
                  value:
                    code: ERR_CAPACITY_EXCEEDED
                    message: 참석 인원이 회의실 정원을 초과했습니다.
        '409':
          description: 예약 충돌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              examples:
                overlap:
                  summary: 중복 예약
                  value:
                    code: ERR_RESERVATION_OVERLAP
                    message: 같은 회의실에 겹치는 예약이 이미 존재합니다.
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    get:
      tags:
        - Reservation
      summary: 날짜별 예약 목록 조회
      description: 특정 날짜의 ACTIVE 예약 목록을 시작 시간 오름차순으로 조회한다.
      operationId: listReservationsByDate
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-06-10"
      responses:
        "200":
          description: 예약 목록 조회 성공
        "400":
          description: 요청값 검증 실패
  /reservations/{id}:
    put:
      tags:
        - Reservation
      summary: 예약 수정
      description: 기존 예약 정보를 수정한다.
      operationId: updateReservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roomId
                - reservationDate
                - startTime
                - endTime
                - ownerName
                - attendees
                - purpose
              properties:
                roomId:
                  type: string
                  example: ROOM_1
                reservationDate:
                  type: string
                  format: date
                  example: "2026-06-10"
                startTime:
                  type: string
                  example: "10:00"
                endTime:
                  type: string
                  example: "11:00"
                ownerName:
                  type: string
                  example: 김태인
                attendees:
                  type: integer
                  example: 3
                purpose:
                  type: string
                  example: 주간 회의
      responses:
        "200":
          description: 예약 수정 성공
        "400":
          description: 입력값 검증 실패
        "404":
          description: 예약을 찾을 수 없음
        "409":
          description: 수정 불가 또는 중복 예약
          
  /reservations/{id}/cancel:
    patch:
      tags:
        - Reservation
      summary: 회의실 예약 취소
      description: |
        기존 예약을 삭제하지 않고 CANCELLED 상태로 변경한다.

        비즈니스 규칙:
        - 존재하지 않는 예약은 취소할 수 없다.
        - 이미 CANCELLED 상태인 예약은 다시 취소할 수 없다.
        - 취소된 예약은 중복 예약 검증 대상에서 제외된다.
      operationId: cancelReservation
      parameters:
        - name: id
          in: path
          required: true
          description: 취소할 예약 ID
          schema:
            type: integer
            minimum: 1
          example: 1
      responses:
        '200':
          description: 예약 취소 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
              example:
                id: 1
                roomId: ROOM_1
                reservationDate: '2026-06-10'
                startTime: '10:00'
                endTime: '11:00'
                ownerName: 김태인
                attendees: 4
                purpose: 회의준비
                status: CANCELLED
                createdAt: '2026-06-10T09:00:00+09:00'
                updatedAt: '2026-06-10T09:30:00+09:00'
        '404':
          description: 존재하지 않는 예약
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                code: ERR_RESERVATION_NOT_FOUND
                message: 존재하지 않는 예약입니다.
        '409':
          description: 이미 취소된 예약
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                code: ERR_ALREADY_CANCELLED
                message: 이미 취소된 예약입니다.
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
components:
  schemas:
    CreateReservationRequest:
      type: object
      additionalProperties: false
      required:
        - roomId
        - reservationDate
        - startTime
        - endTime
        - ownerName
        - attendees
        - purpose
      properties:
        roomId:
          type: string
          description: 예약 대상 회의실 ID
          enum:
            - ROOM_1
            - ROOM_2
          example: ROOM_1
        reservationDate:
          type: string
          format: date
          description: 예약일
          example: '2026-06-10'
        startTime:
          type: string
          description: 예약 시작 시간. 30분 단위여야 한다.
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          example: '09:00'
        endTime:
          type: string
          description: 예약 종료 시간. 30분 단위여야 한다.
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          example: '10:00'
        ownerName:
          type: string
          description: 예약자명. 2자 이상 6자 이하.
          minLength: 2
          maxLength: 6
          example: 김철수
        attendees:
          type: integer
          description: 참석 인원. 회의실 정원을 초과할 수 없다.
          minimum: 1
          maximum: 12
          example: 4
        purpose:
          type: string
          description: 회의 목적. 30자 이내.
          minLength: 1
          maxLength: 30
          example: 주간회의

    Reservation:
      type: object
      additionalProperties: false
      required:
        - id
        - roomId
        - reservationDate
        - startTime
        - endTime
        - ownerName
        - attendees
        - purpose
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          description: 예약 ID
          example: 1
        roomId:
          type: string
          enum:
            - ROOM_1
            - ROOM_2
          example: ROOM_1
        reservationDate:
          type: string
          format: date
          example: '2026-06-10'
        startTime:
          type: string
          example: '09:00'
        endTime:
          type: string
          example: '10:00'
        ownerName:
          type: string
          example: 김철수
        attendees:
          type: integer
          example: 4
        purpose:
          type: string
          example: 주간회의
        status:
          type: string
          enum:
            - ACTIVE
            - CANCELLED
          example: ACTIVE
        createdAt:
          type: string
          format: date-time
          example: '2026-06-10T09:00:00+09:00'
        updatedAt:
          type: string
          format: date-time
          example: '2026-06-10T09:00:00+09:00'

    ProblemDetail:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 애플리케이션 오류 코드
          example: ERR_REQUIRED_FIELD
        message:
          type: string
          description: 사용자에게 표시할 오류 메시지
          example: 필수 입력값이 누락되었습니다.